# ============================================================
#  精益数字化管理 · shadowfei
#  Jekyll Chirpy Theme Configuration
# ============================================================

theme: jekyll-theme-chirpy

lang: zh-CN
timezone: Asia/Shanghai

title: 精益数字化管理 | Lean Digital Management
tagline: 精益管理咨询 · 数字化转型 · 持续改善 / Lean Consulting · Digital Transformation · CI
description: >-
  shadowfei 的精益数字化管理咨询知识库。分享 TPS / VSM / 5S / 六西格玛
  方法论、咨询案例、读书笔记与数字化转型实践。

url: "https://shadowfei.github.io"
baseurl: ""

github:
  username: shadowfei

twitter:
  username:

social:
  name: shadowfei
  email:
  links:
    - https://github.com/shadowfei

# 主题配色（留空则跟随系统）
# theme_mode: dark

# 头像（推荐 120x120 以上）
avatar: /assets/img/avatar.jpg

# CDN 加速（留空=图片走本站自身域名，避免指向 Chirpy demo CDN 导致图片裂开）
cdn: ""

# 文章分页
paginate: 10

# SEO
webmaster_verifications:
  google:
  bing:
  baidu:

# ============================================================
# 集合
# ============================================================
collections:
  tabs:
    output: true
    sort_by: order

# ============================================================
# 分析统计
# ============================================================
analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  fathom:
    id:

# ============================================================
# 评论（暂不启用）
# ============================================================
comments:
  active: false

# ============================================================
# 主题功能
# ============================================================

# 目录
toc: true

# PWA / 离线支持
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

# 编辑链接（启用后文章页显示"在 GitHub 上编辑"）
actions:
  edit_post:
    enabled: false

# ============================================================
# 分类与标签归档
# ============================================================
category_layout: category
tag_layout: tag

# ============================================================
# 构建配置
# ============================================================
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true

sass:
  style: compressed

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: _drafts
    values:
      comments: false

# 压缩 HTML
compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-archives

# 归档配置
jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - rollup.config.js
  - package.json
  - package-lock.json
